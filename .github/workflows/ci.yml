name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only typechecks and runs tests; it needs no write access.
permissions:
  contents: read

# Cancel in-progress runs for the same ref when new commits arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner: the app links AppKit/SwiftUI/CoreMediaIO/CoreAudio and the
    # tests build the app source, so a Linux Swift toolchain won't work.
    # Pinned to macos-26 (not macos-latest) to match the macOS version we
    # develop and ship on, so CI catches breakage on that toolchain.
    runs-on: macos-26
    steps:
      # Pinned to a commit SHA (v5.0.1) for supply-chain safety.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Show Swift version
        run: swift --version

      - name: Typecheck app
        # Mirrors the typecheck step in rebuild-and-restart.sh.
        run: swiftc -parse-as-library -typecheck ExperienceSampling/ExperienceSampling.swift

      - name: Run tests
        # run-tests.sh skips codesigning when CODESIGN_CERT is unset (no Santa
        # on CI runners), so it builds and runs the test binary directly.
        run: ./run-tests.sh

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install SwiftLint
        # Preinstalled on GitHub macOS images, but install on demand if absent.
        run: command -v swiftlint >/dev/null || brew install swiftlint

      - name: Lint
        # Config (.swiftlint.yml) targets the source via `included:`.
        # --strict promotes warnings to errors so the build fails on any finding.
        run: swiftlint lint --strict
