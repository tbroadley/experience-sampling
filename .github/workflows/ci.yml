name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only typechecks and runs tests; it needs no write access.
permissions:
  contents: read

# Cancel in-progress runs for the same ref when new commits arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner: the app links AppKit/SwiftUI/CoreMediaIO/CoreAudio and the
    # tests build the app source, so a Linux Swift toolchain won't work.
    # Pinned to macos-26 (not macos-latest) to match the macOS version we
    # develop and ship on, so CI catches breakage on that toolchain.
    runs-on: macos-26
    steps:
      # Pinned to a commit SHA (v5.0.1) for supply-chain safety.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Show Swift version
        run: swift --version

      - name: Typecheck app
        # Mirrors the typecheck step in rebuild-and-restart.sh.
        run: swiftc -parse-as-library -typecheck ExperienceSampling/ExperienceSampling.swift

      - name: Run tests
        # run-tests.sh skips codesigning when CODESIGN_CERT is unset (no Santa
        # on CI runners), so it builds and runs the test binary directly.
        run: ./run-tests.sh

  lint:
    runs-on: macos-26
    env:
      # Pinned so lint results are reproducible; bump deliberately.
      SWIFTLINT_VERSION: "0.64.1"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Cache SwiftLint
        id: cache-swiftlint
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .swiftlint-bin
          key: swiftlint-${{ env.SWIFTLINT_VERSION }}-macos-26

      - name: Download SwiftLint
        # Official portable binary (no brew dependency resolution). Cached above,
        # so this only runs on a cache miss / version bump.
        if: steps.cache-swiftlint.outputs.cache-hit != 'true'
        run: |
          mkdir -p .swiftlint-bin
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o swiftlint.zip
          unzip -oq swiftlint.zip swiftlint -d .swiftlint-bin

      - name: Lint
        # Config (.swiftlint.yml) targets the source via `included:`.
        # --strict promotes warnings to errors so the build fails on any finding.
        run: ./.swiftlint-bin/swiftlint lint --strict
